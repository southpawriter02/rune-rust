name: PostgreSQL Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Job 1: Run tests with PostgreSQL service container
  postgresql-service-tests:
    name: Tests with PostgreSQL Service
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: RuneAndRust
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Wait for PostgreSQL to be ready
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        timeout 30 bash -c 'until docker exec $(docker ps -q -f "ancestor=postgres:16") pg_isready -U postgres > /dev/null 2>&1; do sleep 1; done'
        echo "PostgreSQL is ready!"

    - name: Run Integration Tests
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --filter "Category=Integration|Category=PostgreSQL" \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --collect:"XPlat Code Coverage"
      env:
        RUNEANDRUST_CONNECTION_STRING: "Host=localhost;Port=5433;Database=RuneAndRust;Username=postgres;Password=password"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-service
        path: |
          **/test-results.trx
          **/TestResults/**/coverage.cobertura.xml
        retention-days: 30

    - name: Publish Test Summary
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: PostgreSQL Service Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: true

  # Job 2: Run tests with Testcontainers (fully automated)
  testcontainers-tests:
    name: Tests with Testcontainers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run Testcontainers Tests
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --filter "Category=Testcontainers" \
          --logger "trx;LogFileName=testcontainers-results.trx" \
          --logger "console;verbosity=detailed"

    - name: Upload Testcontainers Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-testcontainers
        path: '**/testcontainers-results.trx'
        retention-days: 30

  # Job 3: Code coverage report (combined)
  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [postgresql-service-tests]
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        name: test-results-service
        path: ./coverage

    - name: Generate Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.3.11
      with:
        reports: './coverage/**/coverage.cobertura.xml'
        targetdir: './coverage-report'
        reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
        assemblyfilters: '+RuneAndRust.*'

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: './coverage-report'
        retention-days: 30

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: coverage-report/SummaryGithub.md

  # Job 4: Database migration check
  migration-check:
    name: Verify Database Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: RuneAndRust_Migration
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef

    - name: Restore dependencies
      run: dotnet restore

    - name: Check for pending migrations
      run: |
        cd RuneAndRust.Persistence
        dotnet ef migrations has-pending-model-changes
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5433;Database=RuneAndRust_Migration;Username=postgres;Password=password"

    - name: Apply migrations to test database
      run: |
        cd RuneAndRust.Persistence
        dotnet ef database update
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5433;Database=RuneAndRust_Migration;Username=postgres;Password=password"

    - name: Generate SQL script for migrations
      run: |
        cd RuneAndRust.Persistence
        dotnet ef migrations script --idempotent --output migrations.sql

    - name: Upload Migration Script
      uses: actions/upload-artifact@v4
      with:
        name: migration-script
        path: RuneAndRust.Persistence/migrations.sql
        retention-days: 30
